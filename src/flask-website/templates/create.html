{% extends 'layout.html' %}
{% block content %}
<div class="card shadow-sm p-4 mx-auto" style="max-width: 500px;">
    <h3>Nouveau {{ type|upper }}</h3>
    <form method="POST" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" name="name" class="form-control" required minlength="3">
        </div>
        {% if type == 'lb' %}
            <div class="mb-3">
                <label class="form-label">IP Bind</label>
                <input type="text" name="ip_bind" class="form-control" required 
                       pattern="^([0-9]{1,3}\.){3}[0-9]{1,3}$" title="Format IP invalide">
            </div>
            <div class="mb-3">
                <label class="form-label">Pass To</label>
                <input type="url" name="pass" class="form-control" required placeholder="http://...">
            </div>
        {% else %}
            <div class="mb-3">
                <label class="form-label">Port</label>
                <input type="number" name="port" class="form-control" required min="1" max="65535">
            </div>
            <div class="mb-3">
                <label class="form-label">Domaine</label>
                <input type="text" name="domain" class="form-control" required placeholder="example.com">
            </div>
        {% endif %}
        <button type="submit" class="btn btn-success w-100">Enregistrer</button>
    </form>
</div>
{% endblock %}
