{% extends 'layout.html' %}
{% block content %}
<div class="card mx-auto" style="max-width: 500px;">
    <div class="card-header">Nouveau {{ type|upper }}</div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Nom</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            {% if type == 'lb' %}
                <div class="mb-3">
                    <label class="form-label fw-bold">IP Bind</label>
                    <input type="text" name="ip_bind" class="form-control" required pattern="^([0-9]{1,3}\.){3}[0-9]{1,3}$">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Pass To</label>
                    <input type="url" name="pass" class="form-control" required>
                </div>
            {% else %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Port</label>
                    <input type="number" name="port" class="form-control" required min="1" max="65535">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Domaine</label>
                    <input type="text" name="domain" class="form-control" required>
                </div>
            {% endif %}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-success flex-grow-1">Enregistrer</button>
                <a href="/{{ type }}/list" class="btn btn-light">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
