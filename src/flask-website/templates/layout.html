<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Web Generator</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Configurator</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="/ws/list">Serveurs Web</a>
                <a class="nav-link" href="/rp/list">Reverse Proxy</a>
                <a class="nav-link" href="/lb/list">Load Balancer</a>
            </div>
            <div class="navbar-nav">
                {% if session.user %}
                    <span class="navbar-text me-3">Bonjour, Admin</span>
                    <a class="btn btn-outline-danger btn-sm" href="/logout">Déconnexion</a>
                {% else %}
                    <a class="btn btn-outline-success btn-sm" href="/login">Connexion</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
