<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Web Generator</title>
    <style>
        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .floating-nav {
            background-color: #ffffff;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 800px;
            margin: 30px auto 40px auto;
        }
        .nav-links {
            display: flex;
            gap: 10px;
        }
        .nav-link-custom {
            color: #64748b;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .nav-link-custom:hover {
            background-color: #e0f2fe;
            color: #0284c7;
        }
        .brand {
            font-weight: 800;
            color: #0c4a6e;
            font-size: 1.3rem;
            text-decoration: none;
            margin-right: 25px;
            letter-spacing: -0.5px;
        }
        .card, .list-group-item {
            background-color: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
            margin-bottom: 12px;
        }
        .card-header {
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            color: #0c4a6e;
            font-weight: 700;
            border-radius: 16px 16px 0 0;
            padding: 15px 20px;
        }
        .btn {
            border-radius: 10px;
            font-weight: 600;
            border: none;
            padding: 8px 20px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-success, .btn-outline-success { 
            background-color: #0284c7; 
            color: #ffffff; 
        }
        .btn-primary { 
            background-color: #0369a1; 
            color: #ffffff; 
        }
        .btn-danger, .btn-outline-danger { 
            background-color: #0c4a6e; 
            color: #ffffff; 
        }
        .btn-light, .btn-secondary { 
            background-color: #e0f2fe; 
            color: #0369a1; 
        }
        .form-control {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0 ;
            border-radius: 10px;
            color: #1e293b;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
        }
        pre {
            background-color: #0f172a;
            color: #7dd3fc;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Consolas', monospace;
        }
    </style>
</head>
<body>
    <div class="floating-nav">
        <div class="d-flex align-items-center">
            <a href="/" class="brand">Configurator</a>
            <div class="nav-links">
                <a href="/ws/list" class="nav-link-custom">Serveurs Web</a>
                <a href="/rp/list" class="nav-link-custom">Reverse Proxy</a>
                <a href="/lb/list" class="nav-link-custom">Load Balancer</a>
            </div>
        </div>
        <div>
            {% if session.user %}
                <span class="text-muted fw-bold me-3" style="font-size: 0.9rem;">Admin</span>
                <a class="btn btn-danger btn-sm" href="/logout">Logout</a>
            {% else %}
                <a class="btn btn-success btn-sm" href="/login">Login</a>
            {% endif %}
        </div>
    </div>
    <div class="container" style="max-width: 800px;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
